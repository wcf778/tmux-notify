# tmux-notify keybindings - Source this file in your .tmux.conf
# Usage: Add 'source-file ~/.config/opencode/plugins/examples/tmux-bindings.conf' to ~/.tmux.conf
# Or copy these lines directly into your .tmux.conf

# Prefix key (default: Ctrl+b, but users might have changed it)
# These bindings work with whatever prefix key the user has configured

# Show current notification in a popup (prefix + n)
bind-key n display-popup -E -h 20 -w 80 'tail -20 ~/.tmux-notify-*.log 2>/dev/null || echo "No notifications yet"'

# Clear notification history (prefix + N)
bind-key N run-shell '~/.config/opencode/plugins/examples/clear-notifications.sh'

# Add notification pane to current window (prefix + M)
bind-key M run-shell '~/.config/opencode/plugins/examples/tmux-adopt-notify'

# Toggle notification pane visibility (if exists)
bind-key m run-shell 'tmux select-pane -t "#{window_index}.2" 2>/dev/null || tmux-adopt-notify'

# Show latest notification in status bar (optional - requires status-right config)
# set -g status-right "#(~/.config/opencode/plugins/examples/notification-status.sh)"

# Optional: Quick access notification popup with different sizes
# Large popup (prefix + Ctrl+n)
bind-key C-n display-popup -E -h 30 -w 100 '~/.config/opencode/plugins/examples/notification-viewer.sh --latest'
